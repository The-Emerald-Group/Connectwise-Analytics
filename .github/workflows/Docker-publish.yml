name: Build, Push & Cleanup Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      new_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: samuelstreets/connectwise-analytics
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Delete old sha- tagged images from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          IMAGE="samuelstreets/connectwise-analytics"
          KEEP=3  # how many recent sha- tags to keep

          echo "🔐 Authenticating with Docker Hub..."
          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${DOCKERHUB_USERNAME}\", \"password\": \"${DOCKERHUB_TOKEN}\"}" \
            | jq -r .token)

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "❌ Failed to authenticate with Docker Hub"
            exit 1
          fi

          echo "📋 Fetching all tags..."
          PAGE=1
          ALL_SHA_TAGS=""

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE}/tags/?page=${PAGE}&page_size=100")

            TAGS=$(echo "$RESPONSE" | jq -r '.results[] | select(.name | startswith("sha-")) | "\(.last_updated) \(.name)"')
            ALL_SHA_TAGS="${ALL_SHA_TAGS}${TAGS}"$'\n'

            NEXT=$(echo "$RESPONSE" | jq -r '.next')
            if [ "$NEXT" = "null" ] || [ -z "$NEXT" ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          # Sort by date descending, skip the newest $KEEP, delete the rest
          TAGS_TO_DELETE=$(echo "$ALL_SHA_TAGS" | grep -v '^$' | sort -r | tail -n +$((KEEP + 1)) | awk '{print $2}')

          if [ -z "$TAGS_TO_DELETE" ]; then
            echo "✅ Nothing to delete — only ${KEEP} or fewer sha- tags exist."
            exit 0
          fi

          echo "🗑️  Deleting old tags..."
          for TAG in $TAGS_TO_DELETE; do
            echo "  Deleting: ${TAG}"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")

            if [ "$HTTP_STATUS" = "204" ]; then
              echo "  ✅ Deleted: ${TAG}"
            else
              echo "  ⚠️  Failed to delete ${TAG} (HTTP ${HTTP_STATUS})"
            fi
          done

          echo "🎉 Cleanup complete."
